    <!-- Script pour ignorer les erreurs de source maps manquants -->
    <script>
      // Ignore les erreurs de source maps manquants dans la console
      const originalError = console.error;
      const originalWarn = console.warn;
      
      console.error = function(...args) {
        const message = args[0]?.toString() || '';
        // Ignore les erreurs de source maps spécifiques
        if (message.includes('source map') || 
            message.includes('SourceMap') || 
            message.includes('.map') ||
            message.includes('JSON.parse: unexpected character') ||
            message.includes('request failed with status 404') ||
            message.includes('react_devtools_backend') ||
            message.includes('installHook') ||
            message.includes("can't access property") ||
            message.includes('map is undefined') ||
            message.includes('No sources are declared') ||
            message.includes('Échec du chargement pour le module') ||
            message.includes('Failed to load module')) {
          return;
        }
        originalError.apply(console, args);
      };
      
      console.warn = function(...args) {
        const message = args[0]?.toString() || '';
        // Ignore les warnings de source maps
        if (message.includes('source map') || 
            message.includes('SourceMap') || 
            message.includes('.map') ||
            message.includes('No sources are declared')) {
          return;
        }
        originalWarn.apply(console, args);
      };
      
      // Intercepte les erreurs réseau pour les source maps
      const originalFetch = window.fetch;
      window.fetch = function(...args) {
        const url = args[0]?.toString() || '';
        // Retourne une réponse vide pour les requêtes de source maps
        if (url.includes('.map') || url.includes('react_devtools_backend') || url.includes('installHook')) {
          return Promise.resolve(new Response(
            JSON.stringify({ version: 3, sources: [''], names: [], mappings: '' }),
            { 
              status: 200,
              headers: { 'Content-Type': 'application/json' }
            }
          ));
        }
        return originalFetch.apply(this, args).catch((error) => {
          // Ignore les erreurs 404 pour les source maps
          if (url.includes('.map') || url.includes('react_devtools_backend') || url.includes('installHook')) {
            return Promise.resolve(new Response(
              JSON.stringify({ version: 3, sources: [''], names: [], mappings: '' }),
              { 
                status: 200,
                headers: { 'Content-Type': 'application/json' }
              }
            ));
          }
          throw error;
        });
      };
      
      // Intercepte les erreurs de chargement d'images 404 et les ignore silencieusement
      window.addEventListener('error', (event) => {
        if (event.target && event.target.tagName === 'IMG') {
          const img = event.target;
          // Ignore les erreurs 404 pour les images de galerie manquantes
          if (img.src && img.src.includes('/images/gallery/')) {
            event.preventDefault();
            event.stopPropagation();
            // Optionnel : masquer l'image ou afficher un placeholder
            img.style.display = 'none';
          }
        }
      }, true);
      
      // Ignore les erreurs de source maps dans les workers
      if (typeof Worker !== 'undefined') {
        const originalWorker = window.Worker;
        window.Worker = function(...args) {
          const worker = new originalWorker(...args);
          worker.addEventListener('error', (e) => {
            if (e.message && (
              e.message.includes('source map') ||
              e.message.includes('SourceMap') ||
              e.message.includes('.map') ||
              e.message.includes('react_devtools_backend') ||
              e.message.includes('installHook')
            )) {
              e.preventDefault();
              e.stopPropagation();
            }
          });
          return worker;
        };
      }
    </script>
    <!-- Force le chargement via main.jsx -->
    <script>
      // S'assurer que l'app est chargée via main.jsx et pas directement
      if (window.location.pathname === '/' || window.location.pathname.endsWith('.html')) {
        // Ne rien faire, laisser le script principal gérer le chargement
      } else {
        // Rediriger vers la page principale si tentative d'accès direct à App.jsx
        window.location.href = '/';
      }
    </script>

    <!-- Start Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <!-- End Single Page Apps for GitHub Pages -->
